<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Management System</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- ChartJS (Dashboard Charts) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Custom Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <script>
        // Check local storage for theme preference immediately to avoid flash of light mode
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>
<body>
    <!-- App Container -->
    <div class="app-layout">
        
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand" style="padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--sidebar-border);">
                <img src="/static/images/logo.png" alt="Contact Management System" style="height: 48px; max-width: 180px; object-fit: contain;">
                <button class="mobile-close-btn" id="mobileCloseBtn">
                    <i data-lucide="x"></i>
                </button>
            </div>
            
            <nav class="sidebar-menu">
                <ul>
                    <li class="menu-item {% if active_page == 'dashboard' %}active{% endif %}">
                        <a href="{{ url_for('dashboard_page') }}">
                            <i data-lucide="layout-dashboard"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li class="menu-item {% if active_page == 'contacts' %}active{% endif %}">
                        <a href="{{ url_for('contacts_page') }}">
                            <i data-lucide="users"></i>
                            <span>Contacts</span>
                        </a>
                    </li>
                    <li class="menu-item {% if active_page == 'groups' %}active{% endif %}">
                        <a href="{{ url_for('groups_page') }}">
                            <i data-lucide="folder-git"></i>
                            <span>Groups</span>
                        </a>
                    </li>

                    <li class="menu-item {% if active_page == 'profile' %}active{% endif %}">
                        <a href="{{ url_for('profile_page') }}">
                            <i data-lucide="user-cog"></i>
                            <span>Profile & Settings</span>
                        </a>
                    </li>
                </ul>
            </nav>
            
            <!-- Sidebar Footer (Theme Mode and User status) -->
            <div class="sidebar-footer">
                <div class="theme-toggle-container">
                    <span class="theme-mode-label">Dark Mode</span>
                    <button class="theme-toggle-btn" id="themeToggleBtn" aria-label="Toggle Dark Mode">
                        <span class="toggle-slider"></span>
                    </button>
                </div>
                
                <div class="user-block">
                    <img src="{{ user.photo or '/static/images/default-avatar.svg' }}" alt="Avatar" class="user-avatar" id="sidebarAvatar">
                    <div class="user-info">
                        <span class="user-name" id="sidebarName">{{ user.fullName }}</span>
                    </div>
                </div>
                
                <a href="{{ url_for('logout') }}" class="logout-btn">
                    <i data-lucide="log-out"></i>
                    <span>Sign Out</span>
                </a>
            </div>
        </aside>
        
        <!-- Main Content Area -->
        <main class="main-content">
            
            <!-- Top Navbar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="mobile-menu-btn" id="mobileMenuBtn">
                        <i data-lucide="menu"></i>
                    </button>
                </div>
            </header>
            
            <!-- Page Content Body -->
            <div class="content-wrapper">
                {% block content %}{% endblock %}
            </div>
            
        </main>
        
    </div>
    
    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>
    
    <!-- Global Quick Add Contact Modal -->
    <div class="modal-backdrop" id="quickAddModal">
        <div class="modal-card">
            <div class="modal-header">
                <h2>Quick Add Contact</h2>
                <button class="modal-close-btn" id="quickAddCloseBtn"><i data-lucide="x"></i></button>
            </div>
            <form id="quickAddContactForm" class="modal-form" enctype="multipart/form-data">
                <div class="form-row-2">
                    <div class="form-group">
                        <label for="qaFirstName">First Name *</label>
                        <input type="text" id="qaFirstName" name="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="qaLastName">Last Name</label>
                        <input type="text" id="qaLastName" name="lastName">
                    </div>
                </div>
                <div class="form-row-2">
                    <div class="form-group">
                        <label for="qaMobile">Mobile Number *</label>
                        <input type="tel" id="qaMobile" name="mobile" required>
                    </div>
                    <div class="form-group">
                        <label for="qaEmail">Email</label>
                        <input type="email" id="qaEmail" name="email">
                    </div>
                </div>
                <div class="form-group">
                    <label for="qaCategory">Category</label>
                    <select id="qaCategory" name="category">
                        <option value="Personal">Personal</option>
                        <option value="Family">Family</option>
                        <option value="Friends">Friends</option>
                        <option value="Work">Work</option>
                        <option value="Clients">Clients</option>
                        <option value="Business">Business</option>
                        <option value="Emergency">Emergency</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="secondary-btn" id="quickAddCancelBtn">Cancel</button>
                    <button type="submit" class="primary-btn">Save Contact</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Script Initialize -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        // Start Lucide
        lucide.createIcons();
    </script>
</body>
</html>
