<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ContactPro CRM</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Custom Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>
<body class="auth-body">
    
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header" style="margin-bottom: 24px; display: flex; flex-direction: column; align-items: center; gap: 8px;">
                <div class="custom-logo" style="gap: 12px;">
                    <div class="custom-logo-icon" style="width: 52px; height: 52px;">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <linearGradient id="logoCloudGradReg" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="var(--logo-grad-start)" />
                                    <stop offset="100%" stop-color="var(--logo-grad-end)" />
                                </linearGradient>
                            </defs>
                            <path d="M18 10h-.7a7 7 0 0 0-13.8 2.1 4 4 0 0 0-.5 7.9H18a5 5 0 0 0 0-10z" fill="url(#logoCloudGradReg)" />
                            <circle cx="11.5" cy="13.5" r="2.2" fill="#ffffff" />
                            <path d="M8 18.5c0-1.8 1.5-3 3.5-3s3.5 1.2 3.5 3" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" fill="none" />
                        </svg>
                    </div>
                    <span style="font-weight: 850; font-size: 28px; color: var(--text); letter-spacing: -0.5px;">Contact<span style="color: var(--primary);">Pro</span></span>
                </div>
                <p id="authSubtitle" style="color: var(--text-muted); font-size: 14px; margin-top: 4px;">Create your CRM account</p>
            </div>
            
            <div class="auth-tabs" id="authTabs">
                <button class="auth-tab-btn" onclick="location.href='/login'">Sign In</button>
                <button class="auth-tab-btn active" onclick="switchAuthMode('register')">Register</button>
            </div>
            
            <div id="authAlert" class="auth-alert" style="display: none;"></div>

            <!-- Registration Form (Active on register page) -->
            <form id="registerForm" class="auth-form active">
                <div class="form-group">
                    <label for="regName">Full Name</label>
                    <div class="input-with-icon">
                        <i data-lucide="user"></i>
                        <input type="text" id="regName" placeholder="John Doe" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="regEmail">Email Address</label>
                    <div class="input-with-icon">
                        <i data-lucide="mail"></i>
                        <input type="email" id="regEmail" placeholder="name@company.com" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group flex-1">
                        <label for="regPassword">Password</label>
                        <div class="input-with-icon">
                            <i data-lucide="lock"></i>
                            <input type="password" id="regPassword" placeholder="Min. 8 characters" required>
                        </div>
                    </div>
                    
                    <div class="form-group flex-1">
                        <label for="regConfirmPassword">Confirm Password</label>
                        <div class="input-with-icon">
                            <i data-lucide="shield-alert"></i>
                            <input type="password" id="regConfirmPassword" placeholder="Re-enter password" required>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="primary-btn-full" id="registerBtn">
                    <span>Create Account</span>
                    <i data-lucide="arrow-right"></i>
                </button>
            </form>

        </div>
    <!-- Fullscreen Premium Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner-wrap">
                <div class="glowing-spinner"></div>
                <i data-lucide="shield-check" class="loading-icon"></i>
            </div>
            <h3 id="loadingText">Verifying credentials...</h3>
            <p class="loading-subtext">Connecting to secure database</p>
        </div>
    </div>

    <!-- Firebase Client SDK (If Firebase Enabled) -->
    {% if firebase_enabled %}
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script>
        window.firebaseEnabled = true;
    </script>
    {% else %}
    <script>
        window.firebaseEnabled = false;
    </script>
    {% endif %}

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
